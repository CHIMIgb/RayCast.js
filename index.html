<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycasting en Canvas 2D</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #000;
            image-rendering: pixelated; /* Mantiene los bordes nítidos */
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .controls {
            margin-top: 15px;
            text-align: center;
            max-width: 640px;
        }
    </style>
</head>
<body>
    <h1>Raycaster</h1>
    <canvas id="screen" width="640" height="480"></canvas>
    <div class="controls">
        <p><strong>Controles:</strong> Usa las flechas del teclado o W, A, S, D para moverte y rotar.</p>
        <p id="fps">FPS: 0</p>
    </div>
    <script src="raycasting.js"></script>
</body>
</html>
